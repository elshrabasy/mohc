  <a class="whatsapp-float" href="https://wa.me/966564391706" target="_blank" rel="noopener" data-i18n="wa">واتساب</a>
  <script src="app.js"></script>
  
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const orderNo=document.getElementById('trackOrderNo');
  const phone=document.getElementById('trackPhone');
  const btn=document.getElementById('trackBtn');
  const result=document.getElementById('trackResult');

  function render(){
    const orders=getOrders();
    const no=orderNo.value.trim().toLowerCase();
    const ph=phone.value.trim();
    const match=orders.find(o => (no && (o.orderNo||'').toLowerCase()===no) || (ph && o.phone===ph));

    result.classList.remove('hidden');
    if(!no && !ph){
      result.innerHTML='<div class="notice">من فضلك اكتب رقم الأوردر أو رقم الهاتف أولًا.</div>';
      return;
    }
    if(!match){
      result.innerHTML='<div class="empty">لم يتم العثور على أوردر مطابق.</div>';
      return;
    }

    const reason=match.status==='cancelled' && match.cancelReason ? `<p><strong>سبب الإلغاء:</strong> ${escapeHtml(match.cancelReason)}</p>` : '';
    result.innerHTML=`
      <div class="grid-2">
        <div class="card">
          <h3>بيانات الأوردر</h3>
          <p><strong>اسم العميل:</strong> ${escapeHtml(match.customer)}</p>
          <p><strong>رقم الأوردر:</strong> ${escapeHtml(match.orderNo)}</p>
          <p><strong>الوصف:</strong> ${escapeHtml(match.description || '-')}</p>
          <p><strong>وقت التسجيل:</strong> ${escapeHtml(new Date(match.createdAt).toLocaleString('ar-EG'))}</p>
        </div>
        <div class="card">
          <h3>الحالة الحالية</h3>
          <p>${formatStatus(match.status)}</p>
          <p><strong>المدة:</strong> ${escapeHtml(formatDuration(match))}</p>
          <p><strong>ملاحظات:</strong> ${escapeHtml(match.notes || 'لا توجد ملاحظات')}</p>
          ${reason}
        </div>
      </div>
    `;
  }

  btn.addEventListener('click', render);
});
</script>
